services:
  postgres:
    image: postgres:16-alpine
    container_name: timestep-postgres
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-timestep}
      - POSTGRES_USER=${POSTGRES_USER:-timestep}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-timestep}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    networks:
      - timestep-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-timestep}"]
      interval: 10s
      timeout: 5s
      retries: 5

  caddy:
    image: caddy:2-alpine
    container_name: timestep-caddy
    ports:
      - "80:80"
    volumes:
      - ./app:/app:ro
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    networks:
      - timestep-network
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

networks:
  timestep-network:
    driver: bridge

volumes:
  postgres-data:

